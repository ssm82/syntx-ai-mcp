name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest

    strategy:
      # Don't cancel sibling jobs when one Node version fails — that
      # hides the real error and leaves us guessing which version broke.
      fail-fast: false
      matrix:
        # Code uses the `File` and `WebSocket` globals (Node 20+ / 21+),
        # and `engines.node` is `>=20`, so 18.x is intentionally excluded.
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify CLI entrypoint exists
        run: test -f dist/bin/cli.js && test -f dist/bin/cli.mjs

      - name: Test
        run: npm test

  security:
    name: Security gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan the whole commit range.
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # M4: block the merge on high/critical vulnerabilities in
      # production dependencies.
      - name: Dependency audit (npm audit)
        run: npm audit --omit=dev --audit-level=high

      # M4: OSV database scan (catches advisories npm audit misses).
      # Pinned to v2.3.8 — the `google/osv-scanner-action` repo ships
      # `v2.x.y` tags but no floating `v2` major-version tag, so `@v2`
      # fails to resolve. Bump manually on upgrades.
      - name: OSV scanner
        uses: google/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            .

      # M4: secret-leak scan across the working tree and git history.
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
